<html lang="pt-br">
    <head>
        <meta charset="utf-8">
    </head>
    <title>Filmes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- pode usar tudo que tem nesse arquivo dentro da aplicação HTML(é um codigo padrão utilizado no XML para Json) -->
    <script src="xmltojson.js"></script>
    <script>
        function getFilmes() {
            let xmlHttp = new XMLHttpRequest();
            xmlHttp.open('GET', 'http://localhost/ajax/ajax/Estudo_AJAX/filmes.xml')
            
            xmlHttp.onreadystatechange = () => {
                if(xmlHttp.readyState == 4 && xmlHttp.status == 200){
                    let XMLFilmes = xmlHttp.responseText

                    let parser = new DOMParser()
                    // converte uma string de texto contendo codigo html ou xml em um documento DOM
                    domFilmes = parser.parseFromString(XMLFilmes, 'text/xml')

                    jsonFilmes = xmlToJson(domFilmes)

                    for (let i in jsonFilmes['filmes']['filme']) {
                        console.log(jsonFilmes['filmes']['filme'][i])   
                        
                        let divRow = document.createElement ('div')
                        divRow.className = 'row'

                        let divCol = document.createElement('div')
                        divCol.className = 'col'

                        let p1 = document.createElement('p')
                        p1.innerHTML = '<p><strong>Título:</strong> Título do filme</p>'

                        let p2 = document.createElement('p')
                        p2.innerHTML = '<p><strong>Resumo:</strong> Resumo do filme</p>'
                        
                        let p3 = document.createElement('p')
                        p3.innerHTML = '<p><strong>Gênero:</strong> Gênero do filme</p>'
                        
                        let p4 = document.createElement('p')
                        p4.innerHTML = '<p><strong>Elenco:</strong> Elenco do filme</p>'
                        
                        let p5 = document.createElement('p')
                        p5.innerHTML = '<p><strong>Data de lançamento:</strong> Data de lançamento do filme</p>'
                        
                        let hr = createElement('hr')

                        divRow.appendChild(divCol)
                        divCol.appendChild(p1)
                        divCol.appendChild(p2)
                        divCol.appendChild(p3)
                        divCol.appendChild(p4)
                        divCol.appendChild(p5)
                        divCol.appendChild(hr)

                        // apresenta a divCol e todos os paragrafos, após colocar a divRow retorna tudo.
                        document.getElementById('lista').appendChild(divRow)
                       
                    }
                    /*
                     <div class="row">
                        <div class="col">
                            <p><strong>Título:</strong> Titulo do filme</p>
                            <p><strong>Resumo:</strong> Resumo do filme</p>
                            <p><strong>Gênero:</strong> Gênero do filme</p>
                            <p><strong>Elenco:</strong> Elenco do filme</p>
                            <p><strong>Data de lançamento:</strong> Data do lançamento do filme</p>
                            <hr>
                        </div>
                    </div>*/                
                }

                if(xmlHttp.readyState == 4 && xmlHttp.status == 404){
                    // ... tratativa de erro
                }
            }

            xmlHttp.send()
        }
    </script>
    <body>
        <nav class="navbar navbar-light bg-light mb-4">
            <div class="container">
                <div class="navbar-brand mb-0 h1">
                    <h3>Catalogo de filmes</h3>
                </div>
            </div>
        </nav>
        <div class="container" id="lista">
            <div class="row mb-4">
                <div class="col">
                    <button type="button" onclick="getFilmes()">Listar filmes</button>
                </div>
            </div>
        </div>
    </body>
</html>
