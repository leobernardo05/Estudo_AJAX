<!DOCTYPE HTML>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">

		<title>Requisições assíncronas</title>
		
		<!-- bootstrap - link cdn -->
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
		<!-- implementando o XML do Ajax para fazer requicições -->
		<script>
		function requisitarPaginaURL(url){
			// incluir o gif de loading na página
			if(!document.getElementById('loading')) {
				let imgLoading = document.createElement('img')
				imgLoading.id = 'loading'
				imgLoading.src = 'loading.gif'
				imgLoading.className = 'rounded mx-auto d-block'

				document.getElementById('conteudo').appendChild(imgLoading)
			}

			let ajax = new XMLHttpRequest();
			
			// requisição não inicializada (state = 0)
			// console.log(ajax.readyState)

			// configura a URL requisitada
			ajax.open('GET', url, true)
			
			// conexão estabelecida (state = 1)
			// console.log(ajax.readyState)

			// manter a logica para ver o estado
			ajax.onreadystatechange = () => {
				// estado que está acontecendo...
				if(ajax.readyState == 4 && ajax.status == 200) {
					console.log('requisição finalizada com sucesso, o status é 200')
					document.getElementById('loading').remove()
				}

				if(ajax.readyState == 4 && ajax.status == 40) {
					console.log('requisição finalizada com sucesso, mas o status é 404')
					document.getElementById('loading').remove()
				}
			}

			ajax.send()

			// console.log(ajax)
		}
		</script>
	</head>

	<body>

		<!-- Static navbar -->
	    <nav class="navbar navbar-light bg-light mb-4">
	      <div class="container">
	        <div class="navbar-brand mb-0 h1">
	        	<h3>Requisições síncronas e assíncronas</h3>
	        </div>
	      </div>
	    </nav>


	    <div class="container">

	    	<div class="row mb-2">
	    		<div class="col-md-4 center"></div>
	    		<div class="col-md-4 center">
	    			<a href="#" class="btn btn-primary" onclick="requisitarPaginaURL('pagina_1_conteudo.html')">Página 1</a>
	    			<a href="#" class="btn btn-primary" onclick="requisitarPaginaURL('pagina_2_conteudo.html')">Página 2</a>
	    			<a href="#" class="btn btn-primary" onclick="requisitarPaginaURL('pagina_3_conteudo.html')">Página 3</a>
	    		</div>
	    		<div class="col-md-4 center"></div>
	    	</div>
	    	
	    	<div class="row">
		    	<div class="col-md-1"></div>

		    	<div class="col-md-10" id="conteudo">

		    		
		    	</div>
		    		
				<div class="col-md-1"></div>
			</div>

		</div>	
	</body>
</html>
